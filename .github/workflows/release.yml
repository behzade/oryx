name: Release

on:
  push:
    tags:
      - "**"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libdbus-1-dev \
            libfontconfig1-dev \
            libwayland-dev \
            libx11-dev \
            libx11-xcb-dev \
            libxcb-composite0-dev \
            libxcb-damage0-dev \
            libxcb-render-util0-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxcb-xkb-dev \
            libxcursor-dev \
            libxi-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libxrandr-dev \
            pkg-config

      - name: Install cargo-packager
        run: cargo install cargo-packager --locked --version 0.11.8

      - name: Build release packages
        run: cargo packager --release --formats appimage,deb,pacman

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packages-linux
          path: |
            target/release/*.AppImage
            target/release/*.deb
            target/release/*.tar.gz
            target/release/PKGBUILD
          if-no-files-found: error

  publish-linux:
    name: Publish Linux Release
    runs-on: ubuntu-latest
    needs: build-linux

    steps:
      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: packages-linux
          path: dist

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*

  build-macos:
    name: Build macOS
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-packager
        run: cargo install cargo-packager --locked --version 0.11.8

      - name: Build release packages
        run: cargo packager --release --formats dmg

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packages-macos
          path: target/release/*.dmg
          if-no-files-found: error

  publish-macos:
    name: Publish macOS Release Assets
    runs-on: ubuntu-latest
    needs:
      - build-macos
      - publish-linux

    steps:
      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: packages-macos
          path: dist

      - name: Upload macOS release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*

  build-windows:
    name: Build Windows
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install Windows packaging dependencies
        shell: pwsh
        run: choco install nsis --no-progress -y

      - name: Install cargo-packager
        run: cargo install cargo-packager --locked --version 0.11.8

      - name: Build release packages
        run: cargo packager --release --formats nsis

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packages-windows
          path: target/release/*-setup.exe
          if-no-files-found: error

  publish-windows:
    name: Publish Windows Release Assets
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - publish-linux

    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: packages-windows
          path: dist

      - name: Upload Windows release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
